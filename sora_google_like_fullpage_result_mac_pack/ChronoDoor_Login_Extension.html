<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ChronoDoor Login Extension</title>
<meta name="sora-login-extension-type" content="SoraLoginHTML">
<meta name="sora-login-extension-id" content="chronodoor">
<meta name="sora-login-extension-name" content="ChronoDoor">
<meta name="sora-login-extension-version" content="2">
<meta name="sora-login-extension-key" content="CHRONODOOR-LOGIN-HTML-OK">
<meta name="sora-login-extension-password" content="time!">
<meta name="sora-login-extension-icon" content="◴">
<meta name="sora-login-extension-color-a" content="#b45309">
<meta name="sora-login-extension-color-b" content="#f59e0b">
<meta name="sora-login-extension-description" content="ChronoDoorログインを追加するHTML拡張。時計・金色・扉の雰囲気。">
<style>
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:radial-gradient(circle at 20% 20%, color-mix(in srgb,#b45309 46%, transparent), transparent 36%),
             radial-gradient(circle at 84% 12%, color-mix(in srgb,#f59e0b 42%, transparent), transparent 34%),
             linear-gradient(135deg,#0f172a,#b45309,#f59e0b);
  color:#111827;
}
.card{width:min(480px,94vw);padding:28px;border-radius:30px;background:rgba(255,255,255,.93);border:1px solid rgba(255,255,255,.7);box-shadow:0 30px 90px rgba(0,0,0,.35);text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;justify-content:center;min-height:32px;padding:0 13px;border-radius:999px;color:#fff;background:linear-gradient(135deg,#b45309,#f59e0b);font-size:12px;font-weight:1000;letter-spacing:.08em}
.icon{width:70px;height:70px;margin:16px auto 0;border-radius:24px;display:grid;place-items:center;color:#fff;font-size:38px;background:linear-gradient(135deg,#b45309,#f59e0b);box-shadow:0 18px 40px color-mix(in srgb,#b45309 35%, transparent)}
h1{margin:14px 0 8px;color:#111827;font-size:30px}
p{margin:0;color:#475569;line-height:1.7;font-weight:750}
.code{margin-top:16px;padding:12px;border-radius:16px;background:#0f172a;color:#ccfbf1;font-family:ui-monospace,Menlo,monospace;font-size:12px;word-break:break-all}
.small{margin-top:10px;font-size:12px;color:#64748b}
</style>
</head>
<body>
  <main class="card">
    <div class="badge">ChronoDoor Extension</div>
    <div class="icon">◴</div>
    <h1>これはログイン用です</h1>
    <p>このHTMLは、対応アプリに読み込むと <b>ChronoDoor</b> ログインを追加する拡張ファイルです。</p>
    <div class="code">CHRONODOOR-LOGIN-HTML-OK</div>
    <p class="small">読み込みテスト用パスワード：time!</p>
  </main>
</body>
</html>
