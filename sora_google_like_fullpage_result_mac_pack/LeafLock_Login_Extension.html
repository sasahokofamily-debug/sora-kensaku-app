<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LeafLock Login Extension</title>
<meta name="sora-login-extension-type" content="SoraLoginHTML">
<meta name="sora-login-extension-id" content="leaflock">
<meta name="sora-login-extension-name" content="LeafLock">
<meta name="sora-login-extension-version" content="2">
<meta name="sora-login-extension-key" content="LEAFLOCK-LOGIN-HTML-OK">
<meta name="sora-login-extension-password" content="leaf!">
<meta name="sora-login-extension-icon" content="♧">
<meta name="sora-login-extension-color-a" content="#16a34a">
<meta name="sora-login-extension-color-b" content="#84cc16">
<meta name="sora-login-extension-description" content="LeafLockログインを追加するHTML拡張。観葉植物・自然系のアプリに合う。">
<style>
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:radial-gradient(circle at 20% 20%, color-mix(in srgb,#16a34a 46%, transparent), transparent 36%),
             radial-gradient(circle at 84% 12%, color-mix(in srgb,#84cc16 42%, transparent), transparent 34%),
             linear-gradient(135deg,#0f172a,#16a34a,#84cc16);
  color:#111827;
}
.card{width:min(480px,94vw);padding:28px;border-radius:30px;background:rgba(255,255,255,.93);border:1px solid rgba(255,255,255,.7);box-shadow:0 30px 90px rgba(0,0,0,.35);text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;justify-content:center;min-height:32px;padding:0 13px;border-radius:999px;color:#fff;background:linear-gradient(135deg,#16a34a,#84cc16);font-size:12px;font-weight:1000;letter-spacing:.08em}
.icon{width:70px;height:70px;margin:16px auto 0;border-radius:24px;display:grid;place-items:center;color:#fff;font-size:38px;background:linear-gradient(135deg,#16a34a,#84cc16);box-shadow:0 18px 40px color-mix(in srgb,#16a34a 35%, transparent)}
h1{margin:14px 0 8px;color:#111827;font-size:30px}
p{margin:0;color:#475569;line-height:1.7;font-weight:750}
.code{margin-top:16px;padding:12px;border-radius:16px;background:#0f172a;color:#ccfbf1;font-family:ui-monospace,Menlo,monospace;font-size:12px;word-break:break-all}
.small{margin-top:10px;font-size:12px;color:#64748b}
</style>
</head>
<body>
  <main class="card">
    <div class="badge">LeafLock Extension</div>
    <div class="icon">♧</div>
    <h1>これはログイン用です</h1>
    <p>このHTMLは、対応アプリに読み込むと <b>LeafLock</b> ログインを追加する拡張ファイルです。</p>
    <div class="code">LEAFLOCK-LOGIN-HTML-OK</div>
    <p class="small">読み込みテスト用パスワード：leaf!</p>
  </main>
</body>
</html>
