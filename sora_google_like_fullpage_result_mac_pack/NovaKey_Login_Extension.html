<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NovaKey Login Extension</title>
<meta name="sora-login-extension-type" content="SoraLoginHTML">
<meta name="sora-login-extension-id" content="novakey">
<meta name="sora-login-extension-name" content="NovaKey">
<meta name="sora-login-extension-version" content="2">
<meta name="sora-login-extension-key" content="NOVAKEY-LOGIN-HTML-OK">
<meta name="sora-login-extension-password" content="nova!">
<meta name="sora-login-extension-icon" content="✦">
<meta name="sora-login-extension-color-a" content="#4f46e5">
<meta name="sora-login-extension-color-b" content="#ec4899">
<meta name="sora-login-extension-description" content="NovaKeyログインを追加するHTML拡張。星・宇宙・ネオン系の画面になる。">
<style>
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:radial-gradient(circle at 20% 20%, color-mix(in srgb,#4f46e5 46%, transparent), transparent 36%),
             radial-gradient(circle at 84% 12%, color-mix(in srgb,#ec4899 42%, transparent), transparent 34%),
             linear-gradient(135deg,#0f172a,#4f46e5,#ec4899);
  color:#111827;
}
.card{width:min(480px,94vw);padding:28px;border-radius:30px;background:rgba(255,255,255,.93);border:1px solid rgba(255,255,255,.7);box-shadow:0 30px 90px rgba(0,0,0,.35);text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;justify-content:center;min-height:32px;padding:0 13px;border-radius:999px;color:#fff;background:linear-gradient(135deg,#4f46e5,#ec4899);font-size:12px;font-weight:1000;letter-spacing:.08em}
.icon{width:70px;height:70px;margin:16px auto 0;border-radius:24px;display:grid;place-items:center;color:#fff;font-size:38px;background:linear-gradient(135deg,#4f46e5,#ec4899);box-shadow:0 18px 40px color-mix(in srgb,#4f46e5 35%, transparent)}
h1{margin:14px 0 8px;color:#111827;font-size:30px}
p{margin:0;color:#475569;line-height:1.7;font-weight:750}
.code{margin-top:16px;padding:12px;border-radius:16px;background:#0f172a;color:#ccfbf1;font-family:ui-monospace,Menlo,monospace;font-size:12px;word-break:break-all}
.small{margin-top:10px;font-size:12px;color:#64748b}
</style>
</head>
<body>
  <main class="card">
    <div class="badge">NovaKey Extension</div>
    <div class="icon">✦</div>
    <h1>これはログイン用です</h1>
    <p>このHTMLは、対応アプリに読み込むと <b>NovaKey</b> ログインを追加する拡張ファイルです。</p>
    <div class="code">NOVAKEY-LOGIN-HTML-OK</div>
    <p class="small">読み込みテスト用パスワード：nova!</p>
  </main>
</body>
</html>
