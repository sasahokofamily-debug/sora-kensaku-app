<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sora Search - 全画面ページ移動版</title>
<style>
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{margin:0;font-family:Arial,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#fff;color:#202124}
button,input{font:inherit}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button:focus,input:focus,a:focus{outline:2px solid #1a73e8;outline-offset:2px}
a{color:inherit}
.hidden{display:none!important}
.topbar{height:60px;display:flex;align-items:center;justify-content:flex-end;gap:18px;padding:0 22px;font-size:14px;color:#3c4043}
.topbar button{border:0;background:transparent;color:#3c4043;padding:8px}
.apps{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#f1f3f4;color:#5f6368;font-weight:700}
.sign{border:0;border-radius:20px;background:#1a73e8!important;color:#fff!important;padding:10px 18px!important;font-weight:700}
.home{min-height:100vh;display:flex;flex-direction:column}
.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:12vh;padding-left:16px;padding-right:16px;text-align:center}
.logoText{font-size:clamp(52px,12vw,90px);font-weight:700;letter-spacing:-.08em;margin-bottom:28px;line-height:1;user-select:none}
.logoSmall{font-size:30px;font-weight:700;letter-spacing:-.08em;line-height:1;white-space:nowrap;user-select:none}
.b{color:#4285f4}.r{color:#ea4335}.y{color:#fbbc05}.g{color:#34a853}.dark{color:#5f6368}
.searchBox{width:min(640px,94vw);height:48px;border:1px solid #dfe1e5;border-radius:999px;display:flex;align-items:center;gap:12px;padding:0 16px;background:#fff;box-shadow:none;transition:.15s}
.searchBox:hover,.searchBox:focus-within{box-shadow:0 1px 6px rgba(32,33,36,.28);border-color:transparent}
.searchIcon{color:#9aa0a6;font-size:18px}
.searchBox input{flex:1;border:0;outline:0;font-size:16px;background:transparent;color:#202124;min-width:0}
.mic{border:0;background:transparent;color:#4285f4;font-size:18px;padding:4px}
.homeBtns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:28px}
.homeBtns button,.pillBtn{border:1px solid #f8f9fa;background:#f8f9fa;color:#3c4043;border-radius:4px;padding:10px 16px;font-size:14px}
.homeBtns button:hover,.pillBtn:hover{border-color:#dadce0;box-shadow:0 1px 1px rgba(0,0,0,.08)}
.hint{margin-top:28px;color:#5f6368;font-size:13px;line-height:1.8;max-width:720px}
.header{display:flex;align-items:center;gap:24px;padding:20px 28px 14px;border-bottom:1px solid #ebebeb;position:sticky;top:0;background:#fff;z-index:10}
.header .searchBox{width:min(720px,calc(100vw - 180px));height:44px}
.tabs{display:flex;gap:26px;margin-left:170px;padding:0 28px;height:42px;align-items:center;border-bottom:1px solid #ebebeb;color:#5f6368;font-size:14px}
.tabActive{color:#1a73e8;border-bottom:3px solid #1a73e8;height:42px;display:flex;align-items:center}
.resultsWrap{max-width:760px;margin-left:170px;padding:16px 20px 80px}
.stats{font-size:14px;color:#70757a;margin:2px 0 20px}
.result{padding:10px 0 18px}
.resultTop{display:flex;align-items:center;gap:10px;margin-bottom:4px;color:#202124;font-size:14px}
.favicon{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:#f1f3f4;color:#5f6368;font-weight:700;font-size:12px;flex:0 0 auto}
.url{color:#3c4043;font-size:13px;word-break:break-all}
.resultTitle{display:inline-block;color:#1a0dab;font-size:20px;line-height:1.3;text-decoration:none;margin:2px 0 4px}
.resultTitle:hover{text-decoration:underline}
.snippet{color:#4d5156;font-size:14px;line-height:1.58;max-width:690px}
.tagRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:12px;background:#f1f3f4;border-radius:999px;padding:4px 9px;color:#5f6368}
.noResults{padding:28px;border:1px solid #dadce0;border-radius:14px;background:#fff;color:#3c4043;line-height:1.8}
.siteHeader{height:58px;display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid #e0e0e0;background:#fff;position:sticky;top:0;z-index:20}
.backBtn{border:0;background:#f1f3f4;color:#3c4043;border-radius:999px;padding:9px 14px;font-weight:700}
.siteAddress{flex:1;min-width:0;height:38px;border-radius:999px;background:#f1f3f4;color:#5f6368;display:flex;align-items:center;padding:0 16px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.siteMain{max-width:980px;margin:0 auto;padding:34px 20px 80px}
.breadcrumb{font-size:13px;color:#5f6368;margin-bottom:20px}
.articleHero{border-bottom:1px solid #e8eaed;padding-bottom:26px;margin-bottom:26px}
.articleHero h1{font-size:clamp(30px,6vw,52px);letter-spacing:-.03em;line-height:1.1;margin:0 0 14px;color:#202124}
.articleHero p{font-size:17px;color:#4d5156;line-height:1.8;margin:0;max-width:820px}
.articleGrid{display:grid;grid-template-columns:1fr 280px;gap:34px;align-items:start}
.articleBody section{padding:20px 0;border-bottom:1px solid #f1f3f4}
.articleBody h2{font-size:24px;margin:0 0 10px;color:#202124}
.articleBody p{font-size:16px;line-height:1.9;color:#3c4043;margin:0}
.sideCard{border:1px solid #dadce0;border-radius:18px;padding:18px;background:#fff;box-shadow:0 1px 2px rgba(60,64,67,.12)}
.sideCard h3{margin:0 0 10px;font-size:17px}
.sideCard p{margin:0 0 12px;color:#5f6368;line-height:1.7;font-size:14px}
.downloadHero{border:1px solid #dadce0;border-radius:26px;padding:28px;background:linear-gradient(180deg,#fff,#f8fafd);box-shadow:0 1px 3px rgba(60,64,67,.15)}
.downloadTop{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.bigIcon{width:72px;height:72px;border-radius:22px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:26px;box-shadow:0 8px 24px rgba(0,0,0,.14)}
.downloadHero h1{font-size:clamp(28px,5vw,46px);margin:0 0 6px;line-height:1.1}
.downloadHero p{margin:0;color:#5f6368;line-height:1.75}
.actionRow{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
.primaryBtn{border:0;border-radius:999px;background:#1a73e8;color:#fff;padding:12px 18px;font-weight:800}
.secondaryBtn{border:1px solid #dadce0;border-radius:999px;background:#fff;color:#3c4043;padding:12px 18px;font-weight:800}
.infoBoxes{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:20px}
.infoBox{border:1px solid #e8eaed;border-radius:16px;padding:14px;background:#fff}
.infoBox b{display:block;margin-bottom:6px}
.infoBox span{color:#5f6368;font-size:13px;line-height:1.6}
.loginPanel{border:1px solid #dadce0;border-radius:22px;padding:22px;margin-top:28px;background:#fff}
.loginPanel h2{margin:0 0 8px}
.loginPanel p{margin:0 0 16px;color:#5f6368;line-height:1.7}
.fileDrop{border:2px dashed #dadce0;border-radius:18px;padding:20px;text-align:center;background:#f8f9fa;margin-bottom:16px}
.fileDrop input{width:100%;max-width:420px}
.methodList{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
.methodBtn{border:1px solid #dadce0;background:#fff;border-radius:999px;padding:10px 14px;font-weight:800;color:#3c4043}
.methodBtn.active{background:#e8f0fe;border-color:#1a73e8;color:#174ea6}
.loginForm{display:grid;gap:10px;max-width:430px}
.loginForm input{border:1px solid #dadce0;border-radius:12px;padding:12px 14px}
.status{min-height:24px;color:#188038;font-weight:800;margin-top:10px}
.codeBox{margin-top:18px;background:#202124;color:#e8eaed;border-radius:18px;padding:16px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.6;max-height:220px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#202124;color:#fff;padding:12px 16px;border-radius:999px;box-shadow:0 8px 28px rgba(0,0,0,.25);font-size:14px;z-index:100;opacity:0;pointer-events:none;transition:.2s}
.toast.show{opacity:1}
@media(max-width:820px){
  .header{gap:12px;padding:14px;align-items:flex-start;flex-wrap:wrap}
  .header .searchBox{width:100%;order:2}
  .tabs{margin-left:0;padding:0 14px;overflow:auto}
  .resultsWrap{margin-left:0;padding:14px 16px 70px}
  .resultTitle{font-size:18px}
  .articleGrid{grid-template-columns:1fr}
  .infoBoxes{grid-template-columns:1fr}
  .siteHeader{padding:0 10px}
  .siteAddress{font-size:12px}
  .logoSmall{font-size:25px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
const RECORDS = [{"id": "tourism-deep", "kind": "article", "title": "観光Deep Research：旅行前に調べるべきことを一枚で整理", "url": "https://sora-search.local/research/tourism-deep", "description": "観光地の魅力、混雑、アクセス、安全、撮影ポイント、季節ごとの注意をまとめる検索結果です。", "keywords": "観光 Deep Research ディープリサーチ 旅行 調査 観光系 情報 まとめ", "sections": [{"h": "何が分かるページ？", "p": "観光地をただ紹介するだけではなく、「いつ行くと良いか」「どこで混むか」「誰向けか」「写真や動画に向くか」までまとめるページです。"}, {"h": "調べる観点", "p": "アクセス、滞在時間、混雑ピーク、雨の日プラン、子ども連れ、撮影許可、夜の安全、周辺飲食店、SNS向きの見せ方を分けて確認します。"}, {"h": "使い方", "p": "例として「奈良 夜観光」「京都 雨の日」「沖縄 海 安全」のように検索すると、普通の観光情報と調査メモが一緒に出ます。"}]}, {"id": "nara-night", "kind": "article", "title": "奈良の夜観光：静かな街歩きとバー文化を楽しむ", "url": "https://sora-search.local/travel/nara-night", "description": "奈良公園、猿沢池、ならまち、きたまち周辺の夜の雰囲気を、撮影・観光PR目線で整理。", "keywords": "奈良 夜観光 ナイトエコノミー 奈良市 バー LAMP BAR 猿沢池 ならまち きたまち 観光 PR", "sections": [{"h": "概要", "p": "奈良の夜は派手な観光地というより、昼の観光後に街の静けさ・灯り・歴史の余韻を楽しむ方向が合います。"}, {"h": "具体的な回り方", "p": "夕方に奈良公園や猿沢池周辺を歩き、ならまち方面で食事、そのあとバーや夜の街並みへ流すと自然です。観光PRでは「昼の大仏」だけではなく「夜の余韻」を見せると差別化できます。"}, {"h": "注意点", "p": "夜遅くまで開いている観光施設は多くないので、飲食店やバー、ライトアップ、宿泊導線と合わせて考えるのが大事です。"}]}, {"id": "kyoto-basic", "kind": "article", "title": "京都観光：王道ルートと混雑を避ける考え方", "url": "https://sora-search.local/travel/kyoto-basic", "description": "清水寺、祇園、嵐山、伏見稲荷などを、混雑回避と移動のしやすさで整理。", "keywords": "京都 観光 清水寺 祇園 嵐山 伏見稲荷 混雑 回避 旅行", "sections": [{"h": "王道だけで詰めすぎない", "p": "京都は有名スポットが離れているので、1日に清水寺・嵐山・伏見稲荷を全部入れると移動だけで疲れます。エリアを絞る方が満足度が上がりやすいです。"}, {"h": "混雑回避", "p": "朝早め、夕方以降、雨の日、メイン通りから一本外す、という工夫が効きます。写真目的なら時間帯を先に決めるのが重要です。"}, {"h": "子ども連れの場合", "p": "階段や坂が多い場所もあるので、休憩場所とトイレ位置を先に押さえると楽になります。"}]}, {"id": "osaka-food", "kind": "article", "title": "大阪観光：食・ホテル・イベントを中心に組む", "url": "https://sora-search.local/travel/osaka-food-event", "description": "梅田、難波、ホテルイベント、食べ歩きなどを短時間で楽しむ考え方。", "keywords": "大阪 観光 食 ホテル イベント 梅田 難波 心斎橋 撮影", "sections": [{"h": "大阪は目的を決めると強い", "p": "大阪は「食べる」「買う」「イベントに行く」「ホテルで過ごす」のように目的を決めると動きやすいです。"}, {"h": "撮影目線", "p": "ホテルイベントやセミナーは、会場全体・手元・表情・乾杯・外観の順に撮ると編集しやすくなります。"}, {"h": "短時間プラン", "p": "梅田周辺だけ、難波周辺だけなど、エリアを絞ると移動の疲れが減ります。"}]}, {"id": "okinawa-sea", "kind": "article", "title": "沖縄観光：海の楽しさと安全の基本", "url": "https://sora-search.local/travel/okinawa-sea-safety", "description": "沖縄の海遊び、天候、日差し、子ども連れの安全ポイントを整理。", "keywords": "沖縄 観光 海 安全 シュノーケル 子連れ 天気 台風 日差し", "sections": [{"h": "海は天気だけで判断しない", "p": "晴れていても波や潮の流れが強い日は危険です。現地の案内、遊泳可否、監視員の有無を優先します。"}, {"h": "子ども連れ", "p": "ライフジャケット、浅瀬、日陰、休憩、飲み物をセットで考えると安心です。夢中になるほど疲れに気づきにくいので、短い時間で区切ります。"}, {"h": "撮影目線", "p": "海の青さは午前〜昼に出やすいですが、人物は逆光や日差しが強すぎると撮りにくくなります。"}]}, {"id": "tourism-pr-video", "kind": "article", "title": "観光PR動画の作り方：場所紹介より体験の流れを見せる", "url": "https://sora-search.local/creative/tourism-pr-video", "description": "観光動画で、ただの記録ではなく行きたくなる構成にする考え方。", "keywords": "観光 PR 動画 撮影 リール SNS 旅行 企画 構成", "sections": [{"h": "場所より気分を先に見せる", "p": "観光PRでは「ここに何があるか」だけでなく、「行くとどんな気分になるか」が重要です。歩く、見つける、食べる、夜に余韻が残る、という流れを作ります。"}, {"h": "構成例", "p": "1秒目で印象的な景色、次に人の動き、続いて食や体験、最後にもう一度象徴的なカット。短い動画でも起承転結を作れます。"}, {"h": "検索とのつなげ方", "p": "検索結果の説明文には、混雑・アクセス・所要時間など現実的な情報も入れると、見た人が行動しやすくなります。"}]}, {"id": "login-lab", "kind": "tool", "title": "HTMLログイン拡張を読み込むテストページ", "url": "https://sora-search.local/tools/login-extension-loader", "description": "ダウンロードしたログイン拡張HTMLを選ぶと、ログイン方法として追加されるテスト画面。", "keywords": "ログイン 拡張 html 読み込み テスト MiraGate DevSphere SoraPass NovaKey LeafLock ChronoDoor", "sections": []}, {"id": "ext-miragate", "kind": "extension", "name": "MiraGate", "title": "MiraGate Login Extension - HTMLダウンロード", "url": "https://sora-search.local/extensions/MiraGate_PC_Login_Extension.html", "filename": "MiraGate_PC_Login_Extension.html", "description": "出品カルテLiteなどで使えるMiraGateログイン拡張HTML。旧MiraGate形式のmetaにも対応。", "keywords": "MiraGate miragate ミラゲート ログイン 拡張 html ダウンロード sora!", "password": "sora!", "color": "#14b8a6", "html": "<!doctype html>\n<html lang=\"ja\">\n<head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>MiraGate Login Extension</title>\n<meta name=\"sora-login-extension- function setStatus(text, isError=false) {
  const el = document.getElementById('loginStatus');
  if (el) { el.textContent = text; el.style.color = isError ? '#d93025' : '#188038'; }
}
function tryLogin() {
  const methods = allMethods();
  const m = methods.find(x => x.name === state.selectedMethod) || methods[0];
  const pass = document.getElementById('passwordInput')?.value || '';
  if (!m) return setStatus('ログイン方法がありません。', true);
  setStatus('認証中...');
  setTimeout(()=>{
    if (pass === (m.password || 'sora!')) setStatus(`${m.name} でログイン成功。`);
    else setStatus('パスワードが違います。', true);
  }, 450);
}
function downloadExtension(id) {
  const rec = EXTENSIONS.find(e => e.id === id);
  if (!rec) return;
  const blob = new Blob([rec.html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = rec.filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast(`${rec.filename} をダウンロードします`);
}
function showCode(id) {
  const rec = EXTENSIONS.find(e => e.id === id);
  const pre = document.getElementById('codePreview');
  if (!rec || !pre) return;
  pre.textContent = rec.html;
  pre.classList.toggle('hidden');
}
function showToast(text) {
  toastEl.textContent = text;
  toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'), 1800);
}
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(()=>showToast('コピーしました')).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('コピーしました'); } catch(e) { showToast('コピーできませんでした'); }
  ta.remove();
}
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', evt => {
      const action = el.getAttribute('data-action');
      if (action === 'search') { evt.preventDefault(); performSearch(el.getAttribute('data-input')); }
      if (action === 'sample') { evt.preventDefault(); setHash('search/' + encodeURIComponent(el.getAttribute('data-query') || '')); }
      if (action === 'home') { evt.preventDefault(); location.hash = ''; }
      if (action === 'open-login-page') { evt.preventDefault(); setHash('page/login-lab/' + encodeURIComponent(state.lastQuery || 'ログイン拡張 html')); }
      if (action === 'open-login-loader') { evt.preventDefault(); document.getElementById('loginLoader')?.scrollIntoView({behavior:'smooth',block:'start'}); }
      if (action === 'download-extension') { evt.preventDefault(); downloadExtension(el.getAttribute('data-id')); }
      if (action === 'show-code') { evt.preventDefault(); showCode(el.getAttribute('data-id')); }
      if (action === 'select-method') { evt.preventDefault(); state.selectedMethod = el.getAttribute('data-name'); renderMethods(); }
      if (action === 'try-login') { evt.preventDefault(); tryLogin(); }
      if (action === 'copy-url') { evt.preventDefault(); copyText(el.getAttribute('data-url') || ''); }
    }, {passive:false});
  });
  ['homeSearch','resultSearch'].forEach(id => {
    const input = document.getElementById(id);
    if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter') performSearch(id); });
  });
  const fileInput = document.getElementById('extensionFile');
  if (fileInput) fileInput.addEventListener('change', e => handleFileSelect(e.target.files && e.target.files[0]));
}
window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', () => { loadImported(); render(); });
</script>
